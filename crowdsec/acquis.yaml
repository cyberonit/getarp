# Which logs CrowdSec ingests. These are the same JSON files the pipeline reads,
# mounted read-only. Detection (CrowdSec) is decoupled from analytics on purpose.
---
filenames:
  - /var/log/honeypot/cowrie.json
labels:
  type: cowrie-json      # not parsed by CrowdSec; kept for visibility only
---
filenames:
  - /var/log/honeypot/cowrie.log
labels:
  type: cowrie           # matches crowdsecurity/cowrie-logs parser (program == 'cowrie')
---
filenames:
  - /var/log/honeypot/eve.json
labels:
  type: suricata-eve     # not parsed by CrowdSec; kept for visibility only
---
filenames:
  - /var/log/honeypot/fast.log
labels:
  type: suricata-fastlogs   # matches crowdsecurity/suricata-logs parser
---
filenames:
  - /var/log/honeypot/extra.json
labels:
  type: syslog          # parsed by a custom whitelist/notification only; mainly for visibility
