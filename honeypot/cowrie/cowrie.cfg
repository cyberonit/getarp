# Cowrie config — medium-interaction SSH/Telnet honeypot.
# Emulated only: attackers never get a real shell. Output is JSON for the pipeline.

[honeypot]
hostname = db-prod-01
log_path = var/log/cowrie
download_path = var/lib/cowrie/downloads
share_path = share/cowrie
state_path = var/lib/cowrie
contents_path = honeyfs
txtcmds_path = txtcmds
ttylog = true
ttylog_path = var/lib/cowrie/tty
# present a believable, juicy target
auth_class = UserDB
report_public_ip = false

[ssh]
enabled = true
# listen on several SSH-ish ports to widen the surface
listen_endpoints = tcp:2222:interface=0.0.0.0
version = SSH-2.0-OpenSSH_8.9p1 Ubuntu-3ubuntu0.4
ciphers = aes128-ctr,aes192-ctr,aes256-ctr
macs = hmac-sha2-256,hmac-sha2-512

[telnet]
enabled = true
listen_endpoints = tcp:2223:interface=0.0.0.0

# ── outputs: JSON to the shared volume (consumed by pipeline + CrowdSec) ──
[output_jsonlog]
enabled = true
logfile = var/log/cowrie/cowrie.json
epoch_timestamp = false

# keep a local sqlite of sessions too (cheap, useful for debugging the sensor)
[output_sqlite]
enabled = false
