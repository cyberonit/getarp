# getarp.net Defence Intelligence PoC — single-VM orchestration
# Four networks enforce strict isolation:
#   honeypot_net : internet-facing deception. NO member also on data_net/egress_net.
#   data_net     : internal-only (no internet). Postgres, Redis, pipeline, analytics.
#   egress_net   : outbound-only for services needing external CTI APIs (enrichment, crowdsec).
#   frontend_net : edge reverse proxy + api + ui.
#
# NOTE: The cs-firewall-bouncer is intentionally NOT a Docker service — there is no
# official Docker image. It runs as a host-native systemd service, installed and wired
# to the CrowdSec LAPI by bootstrap.sh / setup.sh.

x-logging: &default-logging
  driver: json-file
  options: { max-size: "10m", max-file: "3" }

networks:
  honeypot_net:
    driver: bridge
  data_net:
    driver: bridge
    internal: true          # sealed: no internet egress (Postgres/Redis never reach out)
  egress_net:
    driver: bridge          # outbound internet for CTI lookups and CrowdSec CAPI sync
  frontend_net:
    driver: bridge
    ipam:
      config:
        # Pinned so the API can trust XFF only from this proxy network (Caddy).
        # Keep in sync with TRUSTED_PROXIES on the api service.
        - subnet: 172.19.0.0/16
  ops_net:
    driver: bridge
    internal: true          # api <-> docker-proxy only; keeps the socket proxy off data_net

volumes:
  honeypot_logs:            # written by sensors, read-only to consumers
  pgdata:
  crowdsec_data:
  crowdsec_config:
  caddy_data:
  geoip_data:               # GeoLite2 databases for the enrichment geolite feed

services:
  # Restricted Docker socket proxy — read-only container/image inspection plus
  # container restarts, nothing else. POST stays 0 so /containers/create and
  # /containers/{id}/exec are denied even if the API container is compromised;
  # ALLOW_RESTARTS only whitelists /containers/{id}/(stop|restart|kill).
  # Lives on its own internal network so only the API can reach it.
  docker-proxy:
    image: tecnativa/docker-socket-proxy:0.3
    restart: unless-stopped
    networks: [ops_net]
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    environment:
      CONTAINERS: 1           # GET /containers/* (list, inspect, logs)
      IMAGES: 1               # GET /images/* (versions view)
      POST: 0                 # deny all writes...
      ALLOW_RESTARTS: 1       # ...except stop/restart/kill
      LOG_LEVEL: warning
    deploy:
      resources:
        limits: { cpus: "0.25", memory: 128M }
    logging: *default-logging

  # ───────────────────────── DECEPTION (isolated) ─────────────────────────
  cowrie:
    image: cowrie/cowrie:latest      # no versioned tags available upstream
    restart: unless-stopped
    networks: [honeypot_net]
    ports:
      - "22:2222"           # real sshd MUST be moved to a mgmt port (see setup.sh)
    volumes:
      - ./honeypot/cowrie/cowrie.cfg:/cowrie/cowrie-git/etc/cowrie.cfg:ro
      - ./honeypot/cowrie/userdb.txt:/cowrie/cowrie-git/etc/userdb.txt:ro
      - honeypot_logs:/cowrie/cowrie-git/var/log/cowrie
    cap_drop: [ALL]
    security_opt: ["no-new-privileges:true"]
    deploy:
      resources:
        limits: { cpus: "0.5", memory: 768M }
    logging: *default-logging

  extra-services:
    build: ./honeypot/extra-services
    restart: unless-stopped
    networks: [honeypot_net]
    ports:
      - "80:8080"
      - "8081:8081"         # alt http
      - "3306:3306"         # fake MySQL "DB"
      - "21:2121"           # ftp
      - "6379:6379"         # redis
    volumes:
      - honeypot_logs:/var/log/honeypot
    cap_drop: [ALL]
    security_opt: ["no-new-privileges:true"]
    read_only: true
    tmpfs: ["/tmp"]
    deploy:
      resources:
        limits: { cpus: "0.5", memory: 256M }
    logging: *default-logging

  # ───────────────────────────── DETECTION ────────────────────────────────
  suricata:
    image: jasonish/suricata:7.0
    restart: unless-stopped
    network_mode: host        # needs to see the real public NIC via AF_PACKET
    cap_add: [NET_ADMIN, NET_RAW, SYS_NICE]
    security_opt: ["no-new-privileges:true"]
    command: -i ${PUBLIC_IFACE} --set sensor-name=getarp
    volumes:
      # not :ro — the official entrypoint chowns these to the suricata user on
      # startup (set -e), so a read-only mount makes the container crash-loop
      - ./ids/suricata/suricata.yaml:/etc/suricata/suricata.yaml
      - ./ids/suricata/rules:/etc/suricata/rules
      - honeypot_logs:/var/log/suricata
    deploy:
      resources:
        # sized for a 4 vCPU / 8 GB VM; detect.profile=low + 2 af-packet
        # threads keep Suricata well under this in practice (~50-500 MB)
        limits: { cpus: "1.5", memory: 2G }
    logging: *default-logging

  # ──────────────────── INTEL + ENFORCEMENT (CrowdSec) ────────────────────
  # CrowdSec LAPI — detection engine + community CTI sync (needs egress_net for CAPI)
  crowdsec:
    image: crowdsecurity/crowdsec:v1.7.8
    restart: unless-stopped
    networks: [data_net, egress_net]    # data_net: talks to nothing on internet;
                                        # egress_net: pulls collections + syncs CAPI
    ports:
      - "127.0.0.1:8080:8080"           # LAPI bound to loopback only for host bouncer
    environment:
      COLLECTIONS: "crowdsecurity/suricata crowdsecurity/sshd crowdsecurity/http-cve crowdsecurity/base-http-scenarios"
      PARSERS: "crowdsecurity/cowrie-logs"
      CUSTOM_HOSTNAME: getarp
    volumes:
      - ./crowdsec/acquis.yaml:/etc/crowdsec/acquis.yaml:ro
      - ./crowdsec/profiles.yaml:/etc/crowdsec/profiles.yaml:ro
      - ./crowdsec/whitelists.yaml:/etc/crowdsec/parsers/s02-enrich/getarp-whitelist.yaml:ro
      - honeypot_logs:/var/log/honeypot:ro
      - crowdsec_data:/var/lib/crowdsec/data
      - crowdsec_config:/etc/crowdsec
    deploy:
      resources:
        limits: { cpus: "0.5", memory: 1G }
    logging: *default-logging

  # NOTE: cs-firewall-bouncer is a HOST service (no official Docker image exists).
  # setup.sh installs it via apt and wires it to the LAPI above on 127.0.0.1:8080.
  # See deploy/bootstrap.sh for the installation steps.

  # ──────────────────────────── BUS + STORAGE ─────────────────────────────
  redis:
    image: redis:7.2-alpine
    restart: unless-stopped
    networks: [data_net]
    command: redis-server --save "" --requirepass ${REDIS_PASSWORD} --maxmemory 768mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s
    deploy:
      resources:
        limits: { cpus: "0.25", memory: 1G }
    logging: *default-logging

  postgres:
    image: timescale/timescaledb:2.27.2-pg16
    restart: unless-stopped
    networks: [data_net]
    environment:
      POSTGRES_DB: ${PG_DB}
      POSTGRES_USER: ${PG_USER}
      POSTGRES_PASSWORD: ${PG_PASSWORD}
      PGOPTIONS: >-
        -c app.pipeline_password=${SVC_PIPELINE_PASSWORD:-}
        -c app.enrichment_password=${SVC_ENRICHMENT_PASSWORD:-}
        -c app.analytics_password=${SVC_ANALYTICS_PASSWORD:-}
        -c app.api_password=${SVC_API_PASSWORD:-}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 30s
    deploy:
      resources:
        # sized for a 4 vCPU / 8 GB VM — leaves room for Suricata + the
        # Python services; raise if the VM grows
        limits: { cpus: "2", memory: 4G }
    logging: *default-logging

  # ─────────────────── INGEST / ENRICH / ANALYTICS ────────────────────────
  pipeline:
    build: ./pipeline
    restart: unless-stopped
    networks: [data_net]
    cap_drop: [ALL]
    security_opt: ["no-new-privileges:true"]
    environment:
      PG_HOST: postgres
      PG_PORT: "5432"
      PG_DB: ${PG_DB}
      PG_USER: ${PG_USER}
      PG_PASSWORD: ${PG_PASSWORD}
      SVC_DB_USER: svc_pipeline
      SVC_DB_PASSWORD: ${SVC_PIPELINE_PASSWORD:-}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
    volumes:
      - honeypot_logs:/data/logs:ro      # READ-ONLY: one-way telemetry crossing the boundary
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    deploy:
      resources:
        limits: { cpus: "0.5", memory: 1G }
    logging: *default-logging

  enrichment:
    build: ./enrichment
    restart: unless-stopped
    networks: [data_net, egress_net]    # data_net: Redis/Postgres; egress_net: CTI APIs
    cap_drop: [ALL]
    security_opt: ["no-new-privileges:true"]
    environment:
      PG_HOST: postgres
      PG_PORT: "5432"
      PG_DB: ${PG_DB}
      PG_USER: ${PG_USER}
      PG_PASSWORD: ${PG_PASSWORD}
      SVC_DB_USER: svc_enrichment
      SVC_DB_PASSWORD: ${SVC_ENRICHMENT_PASSWORD:-}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
      ENRICHMENT_PROVIDER: ${ENRICHMENT_PROVIDER:-tiered}
      CROWDSEC_LAPI_URL: http://crowdsec:8080
      CROWDSEC_BOUNCER_KEY: ${CROWDSEC_BOUNCER_KEY}
      CROWDSEC_CTI_KEY: ${CROWDSEC_CTI_KEY:-}
      ABUSEIPDB_KEY: ${ABUSEIPDB_KEY:-}
      ABUSECH_KEY: ${ABUSECH_KEY:-}
      GREYNOISE_KEY: ${GREYNOISE_KEY:-}
      VIRUSTOTAL_KEY: ${VIRUSTOTAL_KEY:-}
      VT_ENABLE: ${VT_ENABLE:-false}
      MAXMIND_LICENSE_KEY: ${MAXMIND_LICENSE_KEY:-}
      FEED_REFRESH_HOURS: ${FEED_REFRESH_HOURS:-3}
      ENRICHMENT_CACHE_TTL_DAYS: ${ENRICHMENT_CACHE_TTL_DAYS:-14}
      TIER2_MIN_EVENTS: ${TIER2_MIN_EVENTS:-10}
      TIER2_MIN_THREAT_SCORE: ${TIER2_MIN_THREAT_SCORE:-30}
      TIER2_HIGH_THREAT_SCORE: ${TIER2_HIGH_THREAT_SCORE:-60}
      ABUSEIPDB_DAILY_QUOTA: ${ABUSEIPDB_DAILY_QUOTA:-900}
      GREYNOISE_429_COOLDOWN: ${GREYNOISE_429_COOLDOWN:-21600}
    volumes:
      - geoip_data:/geoip                 # GeoLite2 .mmdb files (see enrichment/feeds.py)
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      crowdsec:
        condition: service_started
    deploy:
      resources:
        limits: { cpus: "0.5", memory: 1G }
    logging: *default-logging

  analytics:
    build: ./analytics
    restart: unless-stopped
    networks: [data_net]
    cap_drop: [ALL]
    security_opt: ["no-new-privileges:true"]
    environment:
      PG_HOST: postgres
      PG_PORT: "5432"
      PG_DB: ${PG_DB}
      PG_USER: ${PG_USER}
      PG_PASSWORD: ${PG_PASSWORD}
      SVC_DB_USER: svc_analytics
      SVC_DB_PASSWORD: ${SVC_ANALYTICS_PASSWORD:-}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
      ENABLED_DETECTORS: ${ENABLED_DETECTORS:-scan,attack}
      ENABLED_PROFILERS: ${ENABLED_PROFILERS:-default}
      STATUS_INTERVAL_SECONDS: ${STATUS_INTERVAL_SECONDS:-300}
      REPORT_CRON_HOUR: ${REPORT_CRON_HOUR:-6}
      CROWDSEC_LAPI_URL: http://crowdsec:8080
      CROWDSEC_BOUNCER_KEY: ${CROWDSEC_BOUNCER_KEY:-}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    deploy:
      resources:
        limits: { cpus: "1", memory: 2G }
    logging: *default-logging

  # ─────────────────────────── API + UI + EDGE ────────────────────────────
  api:
    build: ./api
    restart: unless-stopped
    networks: [data_net, frontend_net, ops_net]
    cap_drop: [ALL]
    security_opt: ["no-new-privileges:true"]
    environment:
      PG_HOST: postgres
      PG_PORT: "5432"
      PG_DB: ${PG_DB}
      PG_USER: ${PG_USER}
      PG_PASSWORD: ${PG_PASSWORD}
      SVC_DB_USER: svc_api
      SVC_DB_PASSWORD: ${SVC_API_PASSWORD:-}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRE_MINUTES: ${JWT_EXPIRE_MINUTES:-60}
      ADMIN_USER: ${ADMIN_USER}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
      CROWDSEC_LAPI_URL: http://crowdsec:8080
      CROWDSEC_BOUNCER_KEY: ${CROWDSEC_BOUNCER_KEY}
      DOCKER_HOST: tcp://docker-proxy:2375
      # Honor X-Forwarded-For only from Caddy on frontend_net (see api/ratelimit.py).
      # Must match the frontend_net subnet pinned under networks:.
      TRUSTED_PROXIES: ${TRUSTED_PROXIES:-172.19.0.0/16}
    volumes:
      - ./docs:/app/docs:ro
      - honeypot_logs:/data/logs:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    deploy:
      resources:
        limits: { cpus: "0.5", memory: 1G }
    logging: *default-logging

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_BASE: /api
    restart: unless-stopped
    networks: [frontend_net]
    cap_drop: [ALL]
    security_opt: ["no-new-privileges:true"]
    deploy:
      resources:
        limits: { cpus: "0.25", memory: 256M }
    logging: *default-logging

  caddy:
    image: caddy:2.8-alpine
    restart: unless-stopped
    networks: [frontend_net]
    cap_drop: [ALL]
    cap_add: [NET_BIND_SERVICE]
    security_opt: ["no-new-privileges:true"]
    deploy:
      resources:
        limits: { cpus: "1", memory: 2G }
    environment:
      ADMIN_IP: ${ADMIN_IP}
    ports:
      - "443:443"
      - "8443:80"           # port 80 is taken by the honeypot; ACME via TLS-ALPN on 443
    volumes:
      - ./deploy/caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
    depends_on: [api, frontend]
    logging: *default-logging
